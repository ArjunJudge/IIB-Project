mesh_path: # unstructured grid file path e.g. "../../../../mesh.vtu" - accepts .vtu/.vtk
image_path: # if provided, will render this image of e.g. torso/surrounding anatomy e.g. "../../../../image.vti" - accepts only .vti
image_scalar_name: # REQUIRED if image_path is provided, name of scalar array which is thresholded to create the image point cloud e.g. "ImageScalars"
mesh_extraction_array_name: # if provided, will remove parts of the mesh based on this scalar array e.g. "level_set"/"sdf"
mesh_extraction_value: # the value at which to extract the mesh based on the extraction array e.g. for sdf, we normally use 0.0 - default: 0.0
mesh_target_num_points: # target number of points for mesh decimation (if animation enabled). Default: 25000
streamline_seed_pt_idx: # OPTIONAL - if provided, will use this point index to seed streamline generation
velocity_array_name: # REQUIRED IF DRAWING STREAMLINES. E.g. velocity
pressure_array_name: # not required, but if provided, will compute pressure gradient
animation_enabled: # boolean to enable/disable animation
initial_timestep: # starting timestep for animation. Default: 0
final_timestep: # REQUIRED IF ANIMATION ENABLED. ending timestep for animation
update_time: # time interval between animation updates in seconds. Default: 0.15s

## FOR ANIMATION - THE EXPECTED FORMAT IS MULTIPLE SDFs WITH THE BELOW NAMING CONVENTION:
# {mesh_extraction_array_name}_t{timestep} e.g. sdf_t0, sdf_t1, sdf_t2 etc. up to final_timestep
